# 宝塔面板 Nginx 配置
# 将此内容复制到宝塔面板的站点配置中

server {
    listen 80;
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;
    
    # SSL 证书（宝塔面板自动配置）
    # ssl_certificate /www/server/panel/vhost/cert/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /www/server/panel/vhost/cert/yourdomain.com/privkey.pem;
    
    # 前端静态资源（Vue 构建后的 dist 目录）
    location / {
        root /www/wwwroot/algo-mind/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # 缓存静态资源
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
    
    # 后端 API 代理
    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 关键：WebSocket 支持（如果需要）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # 头像上传目录（可选，也可以让后端处理）
    location /uploads/ {
        alias /www/wwwroot/algo-mind/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }
    
    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
}
