spring:
  profiles:
    active: test
  datasource:
    url: jdbc:h2:mem:algodb-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.H2Dialect

ip:
  location:
    enabled: false

auth:
  jwt:
    issuer: test-suite
    secret: test-suite-jwt-secret-key-change-me-2026
    expiration-minutes: 60
