    memory: ${JUDGE0_MEMORY:262144}
    wall-time: ${JUDGE0_WALL_TIME:10}
    output: ${JUDGE0_OUTPUT:10240}
    max-cpu-time: ${JUDGE0_MAX_CPU_TIME:15}
    max-memory: ${JUDGE0_MAX_MEMORY:524288}
    max-wall-time: ${JUDGE0_MAX_WALL_TIME:30}
    max-output: ${JUDGE0_MAX_OUTPUT:65536}
  use-mock: ${JUDGE0_USE_MOCK:false}

