# 生产环境配置 - 宝塔面板部署用

# 服务器端口（宝塔面板通常用 8080 或其他非 80 端口，由 Nginx 转发）
server:
  port: 8000
  servlet:
    context-path: /api

# CORS 跨域配置 - 必须改成你的真实域名
cors:
  allowed-origins: "http://localhost:5173,http://localhost:5174,http://localhost:5175,https://www.usloa.com,https://usloa.com"

# 文件上传配置
file:
  upload-dir: /www/wwwroot/your-project/uploads/avatars

# AI 配置（从环境变量读取，不要在代码里写死）
ai:
  api-key: ${AI_API_KEY:}

# 豆包 AI 配置
doubao:
  api:
    key: ${ARK_API_KEY:03a61838-4454-49e5-acca-c0d372f0207d}
    # 普通对话 API
    url: https://ark.cn-beijing.volces.com/api/v3/chat/completions
    # 多模态 Responses API（支持图片）
    multimodal-url: https://ark.cn-beijing.volces.com/api/v3/responses
    model: ${DOUBAO_MODEL:doubao-seed-1-8-251228}
    timeout: 30000
    max-retries: 3
    temperature: 0.7
    max-tokens: 4096

# 应用上传配置
app:
  upload:
    # 聊天文件上传目录（本地开发环境）
    chat-files: uploads/chat-files
    # 文件访问基础 URL
    base-url: http://localhost:8000/api/uploads

# 数据库配置（生产环境，连接服务器MySQL）
spring:
  # MySQL 数据库配置（你服务器上的库）
  datasource:
    url: jdbc:mysql://43.139.148.97:9191/algomind_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: algomind_user
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA 真实连接 MySQL
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect
    
# 日志配置 - 只输出到控制台
logging:
  level:
    root: WARN
    com.example.demo: INFO
