# 生产环境配置 - 宝塔面板部署用

# 服务器端口（宝塔面板通常用 8080 或其他非 80 端口，由 Nginx 转发）
server:
  port: 8080
  servlet:
    context-path: /api

# CORS 跨域配置 - 必须改成你的真实域名
cors:
  allowed-origins: https://www.yourdomain.com,https://yourdomain.com

# 文件上传配置
file:
  upload-dir: /www/wwwroot/your-project/uploads/avatars

# AI 配置（从环境变量读取，不要在代码里写死）
ai:
  api-key: ${AI_API_KEY:}

# 数据库配置（生产环境，连接服务器MySQL）
spring:
  datasource:
    url: jdbc:mysql://43.139.148.97:9191/algomind_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: algomind_user
    password: 123456
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    
# 日志配置
logging:
  level:
    root: WARN
    com.example.demo: INFO
  file:
    name: /www/wwwroot/your-project/logs/app.log
