services:
  mysql:
    image: mysql:8.0
    container_name: algomind-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-algomind123456}
      MYSQL_DATABASE: algomind_db
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - algomind-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: algomind-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod-env
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: algomind_db
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-algomind123456}
      JWT_SECRET: ${JWT_SECRET:-algo-mind-prod-jwt-secret-key-change-me-2026}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://www.usloa.cn,https://usloa.cn}
      JUDGE0_API_URL: ${JUDGE0_API_URL:-http://judge0:2358}
      JUDGE0_USE_MOCK: ${JUDGE0_USE_MOCK:-false}
      ARK_API_KEY: ${ARK_API_KEY:-}
      FILE_UPLOAD_DIR: /www/algo-mind/uploads/avatars
      APP_UPLOAD_CHAT_FILES: /www/algo-mind/uploads/chat-files
      APP_UPLOAD_BASE_URL: ${APP_UPLOAD_BASE_URL:-https://www.usloa.cn/api/uploads}
    volumes:
      - uploads:/www/algo-mind/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - algomind-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: algomind-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads:/www/algo-mind/uploads:ro
    depends_on:
      - backend
    networks:
      - algomind-net

networks:
  algomind-net:
    driver: bridge

volumes:
  mysql-data:
  uploads:
